[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "DJ",   # flake8-django
    "S",    # flake8-bandit (security)
]
ignore = [
    "S101",   # Use of assert — fine in tests
    "S105",   # Hardcoded password — false positives in tests
    "DJ001",  # Avoid using null=True on string-based fields — we use blank=True where needed
    "B904",   # Within an except clause use raise ... from err
    "N999",   # Invalid module name
]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = ["S", "N802", "N806"]
"*/migrations/*" = ["E501"]
"config/settings/*" = ["F401", "F403", "F405", "E402"]

[tool.coverage.run]
source = ["apps"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/management/commands/*",
    "conftest.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
