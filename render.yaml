# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy the full TaskForge backend stack:
#   • PostgreSQL database
#   • Redis (cache + Celery broker + Channels layer)
#   • Daphne ASGI web service (Django + Channels)
#
# Usage: Push this file to GitHub, connect the repo in the Render dashboard,
# and "Create New Blueprint Instance" to provision all resources at once.

databases:
  - name: taskforge-db
    databaseName: taskforge
    user: taskforge
    plan: free

services:
  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: taskforge-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # private — only accessible to other Render services

  # ── Django / Daphne web service ───────────────────────────────────────────────
  - type: web
    name: taskforge-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    healthCheckPath: /api/v1/schema/

    envVars:
      # ── Django settings ───────────────────────────────────────────────────
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: RENDER
        value: "true"

      # ── Secrets (auto-generated by Render — never commit these) ───────────
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

      # ── Database & Redis (wired automatically from above services) ─────────
      - key: DATABASE_URL
        fromDatabase:
          name: taskforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: taskforge-redis
          property: connectionString
      - key: CHANNELS_REDIS_URL
        fromService:
          type: redis
          name: taskforge-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: taskforge-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: taskforge-redis
          property: connectionString

      # ── Set these manually in the Render dashboard after first deploy ──────
      # FRONTEND_URL    → your Netlify URL, e.g. https://taskforge.netlify.app
      # CORS_ALLOWED_ORIGINS → same as FRONTEND_URL
      # ALLOWED_HOSTS   → comma-separated, e.g. taskforge-api.onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false

      # ── Email (optional — falls back to console log if not set) ───────────
      - key: DEFAULT_FROM_EMAIL
        value: noreply@taskforge.io
      - key: SENDGRID_API_KEY
        sync: false

      # ── AWS S3 (optional — falls back to WhiteNoise if not set) ──────────
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_REGION_NAME
        value: us-east-1

      # ── Monitoring (optional) ─────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false

      # ── Google OAuth (optional) ───────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
